<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STM32 蓝牙监控</title>
    
    <!-- PWA Manifest (内嵌 JSON) -->
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22: %22STM32 蓝牙监控系统%22,
        %22short_name%22: %22蓝牙监控%22,
        %22description%22: %22连接JDY-33，实时显示温度、电压、电流，并可设置报警阈值%22,
        %22start_url%22: %22.%22,
        %22display%22: %22standalone%22,
        %22orientation%22: %22portrait%22,
        %22background_color%22: %22%23f5f7fb%22,
        %22theme_color%22: %22%233b82f6%22,
        %22icons%22: [
            {
                %22src%22: %22https://placehold.co/192x192/3b82f6/white?text=BT%22,
                %22sizes%22: %22192x192%22,
                %22type%22: %22image/png%22
            },
            {
                %22src%22: %22https://placehold.co/512x512/3b82f6/white?text=BT+Monitor%22,
                %22sizes%22: %22512x512%22,
                %22type%22: %22image/png%22,
                %22purpose%22: %22any maskable%22
            }
        ]
    }">
    
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="蓝牙监控">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/3b82f6/white?text=BT">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 24px 20px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 20px;
            font-weight: 400;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 40px;
            margin-bottom: 24px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: background 0.2s;
        }
        .led.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b98180;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            border: none;
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 8px #3b82f640;
        }
        .btn-primary:active { background: #2563eb; }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }
        .btn-outline:active { background: #f1f5f9; }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }
        .data-item {
            background: #f8fafc;
            border-radius: 24px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .data-label {
            font-size: 1.2rem;
            font-weight: 500;
            color: #334155;
        }
        .data-value {
            font-size: 2.4rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
        }
        .data-unit {
            font-size: 1rem;
            font-weight: 400;
            color: #64748b;
            margin-left: 4px;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .threshold-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
        }
        .threshold-item label {
            width: 70px;
            font-weight: 500;
            color: #475569;
        }
        .threshold-item input {
            flex: 1;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 1rem;
            background: white;
            outline: none;
            transition: border 0.15s;
        }
        .threshold-item input:focus {
            border-color: #3b82f6;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .action-buttons .btn {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 1.1rem;
        }
        .footer-note {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }
        .warning {
            background: #fef9c3;
            color: #854d0e;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>📟 监测系统</h1>
    <div class="subtitle">JDY-33 · 蓝牙串口</div>

    <!-- 状态栏 + 连接按钮 -->
    <div class="status-bar">
        <div class="status-indicator">
            <span class="led" id="led"></span>
            <span id="statusText">未连接</span>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="connectBtn">🔗 连接</button>
            <button class="btn btn-outline" id="disconnectBtn" disabled>断开</button>
        </div>
    </div>

    <!-- 浏览器兼容提示 -->
    <div id="compatWarning" class="warning" style="display: none;">
        ⚠️ 当前浏览器不支持 Web Serial，请使用 Chrome/Edge 桌面版或 Android 版。
    </div>

    <!-- 实时数据 -->
    <div class="data-grid">
        <div class="data-item">
            <span class="data-label">🌡️ 温度</span>
            <span class="data-value" id="tempDisplay">--<span class="data-unit">°C</span></span>
        </div>
        <div class="data-item">
            <span class="data-label">⚡ 电压</span>
            <span class="data-value" id="voltDisplay">--<span class="data-unit">V</span></span>
        </div>
        <div class="data-item">
            <span class="data-label">🔌 电流</span>
            <span class="data-value" id="currDisplay">--<span class="data-unit">A</span></span>
        </div>
    </div>

    <!-- 阈值设置区域 -->
    <div class="section-title">⚙️ 报警阈值</div>
    <div class="threshold-item">
        <label>温度</label>
        <input type="number" id="tempThreshold" value="30.0" step="0.5" min="0" max="100"> <span style="margin-left:6px;">°C</span>
    </div>
    <div class="threshold-item">
        <label>电流</label>
        <input type="number" id="currThreshold" value="2.00" step="0.10" min="0" max="10"> <span style="margin-left:6px;">A</span>
    </div>
    <div class="threshold-item">
        <label>电压</label>
        <input type="number" id="voltThreshold" value="5.50" step="0.10" min="0" max="30"> <span style="margin-left:6px;">V</span>
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" id="updateThresholdBtn">📤 更新阈值</button>
        <button class="btn btn-outline" id="stopAlarmBtn">🔕 停止报警</button>
    </div>
    <div class="footer-note" id="messageFooter">就绪</div>
</div>

<script>
    // ==================== Service Worker 注册 ====================
    if ('serviceWorker' in navigator) {
        // 内嵌一个极简的 Service Worker，满足 PWA 安装条件
        const swCode = `
            self.addEventListener('install', () => self.skipWaiting());
            self.addEventListener('activate', () => self.clients.claim());
            self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).then(() => {
            console.log('Service Worker 已注册（内嵌）');
        }).catch(e => console.warn('SW 注册失败:', e));
    }

    // ==================== 主程序 ====================
    (function() {
        "use strict";

        // DOM 元素
        const led = document.getElementById('led');
        const statusText = document.getElementById('statusText');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const tempDisplay = document.getElementById('tempDisplay');
        const voltDisplay = document.getElementById('voltDisplay');
        const currDisplay = document.getElementById('currDisplay');
        const tempThreshold = document.getElementById('tempThreshold');
        const currThreshold = document.getElementById('currThreshold');
        const voltThreshold = document.getElementById('voltThreshold');
        const updateThresholdBtn = document.getElementById('updateThresholdBtn');
        const stopAlarmBtn = document.getElementById('stopAlarmBtn');
        const messageFooter = document.getElementById('messageFooter');
        const compatWarning = document.getElementById('compatWarning');

        // 状态变量
        let port = null;
        let reader = null;
        let isConnected = false;
        let buffer = '';

        // 检查 Web Serial API 支持
        const isWebSerialSupported = 'serial' in navigator;
        if (!isWebSerialSupported) {
            compatWarning.style.display = 'block';
            connectBtn.disabled = true;
            messageFooter.textContent = '浏览器不支持 Web Serial';
        }

        function setConnected(state) {
            isConnected = state;
            if (state) {
                led.classList.add('connected');
                statusText.textContent = '已连接';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                messageFooter.textContent = '蓝牙已连接';
            } else {
                led.classList.remove('connected');
                statusText.textContent = '未连接';
                connectBtn.disabled = !isWebSerialSupported;
                disconnectBtn.disabled = true;
                messageFooter.textContent = '已断开';
                tempDisplay.innerHTML = '--<span class="data-unit">°C</span>';
                voltDisplay.innerHTML = '--<span class="data-unit">V</span>';
                currDisplay.innerHTML = '--<span class="data-unit">A</span>';
            }
        }

        async function sendCommand(cmd) {
            if (!port || !port.writable) {
                messageFooter.textContent = '错误: 串口未连接';
                return false;
            }
            try {
                const writer = port.writable.getWriter();
                const data = new TextEncoder().encode(cmd + '\r\n');
                await writer.write(data);
                writer.releaseLock();
                messageFooter.textContent = `已发送: ${cmd}`;
                return true;
            } catch (e) {
                console.error('发送失败:', e);
                messageFooter.textContent = '发送失败';
                return false;
            }
        }

        function parseLine(line) {
            line = line.trim();
            if (!line) return;
            
            const tempMatch = line.match(/TEMP:([-+]?\d*\.?\d+)/i);
            const voltMatch = line.match(/VOLT:([-+]?\d*\.?\d+)/i);
            const currMatch = line.match(/CURR:([-+]?\d*\.?\d+)/i);

            if (tempMatch) {
                const val = parseFloat(tempMatch[1]);
                tempDisplay.innerHTML = `${val.toFixed(1)}<span class="data-unit">°C</span>`;
            }
            if (voltMatch) {
                const val = parseFloat(voltMatch[1]);
                voltDisplay.innerHTML = `${val.toFixed(2)}<span class="data-unit">V</span>`;
            }
            if (currMatch) {
                const val = parseFloat(currMatch[1]);
                currDisplay.innerHTML = `${val.toFixed(2)}<span class="data-unit">A</span>`;
            }
        }

        function processIncoming(text) {
            buffer += text;
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (let line of lines) {
                line = line.replace(/\r$/, '');
                parseLine(line);
            }
        }

        async function readLoop() {
            if (!port || !port.readable) return;
            try {
                reader = port.readable.getReader();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) {
                        reader.releaseLock();
                        break;
                    }
                    const text = new TextDecoder().decode(value);
                    processIncoming(text);
                }
            } catch (e) {
                console.warn('读取错误:', e);
            } finally {
                if (reader) {
                    reader.releaseLock();
                    reader = null;
                }
                if (isConnected) {
                    setConnected(false);
                    port = null;
                }
            }
        }

        connectBtn.addEventListener('click', async () => {
            if (!isWebSerialSupported) {
                alert('浏览器不支持 Web Serial，请使用 Chrome/Edge。');
                return;
            }
            try {
                const newPort = await navigator.serial.requestPort();
                await newPort.open({ baudRate: 9600 });
                
                port = newPort;
                setConnected(true);
                
                readLoop().catch(e => console.error('读取循环异常', e));
            } catch (e) {
                if (e.message.includes('No port selected')) {
                    messageFooter.textContent = '未选择设备';
                } else {
                    console.error(e);
                    messageFooter.textContent = '连接失败: ' + e.message;
                }
            }
        });

        disconnectBtn.addEventListener('click', async () => {
            try {
                if (reader) {
                    await reader.cancel();
                    reader.releaseLock();
                    reader = null;
                }
                if (port) {
                    await port.close();
                    port = null;
                }
                setConnected(false);
            } catch (e) {
                console.error('断开错误:', e);
            }
        });

        updateThresholdBtn.addEventListener('click', async () => {
            if (!isConnected) {
                messageFooter.textContent = '请先连接蓝牙';
                return;
            }
            const tempVal = parseFloat(tempThreshold.value);
            const currVal = parseFloat(currThreshold.value);
            const voltVal = parseFloat(voltThreshold.value);
            
            if (isNaN(tempVal) || isNaN(currVal) || isNaN(voltVal)) {
                messageFooter.textContent = '阈值必须为数字';
                return;
            }
            
            await sendCommand(`SET_TEMP_ALARM:${tempVal.toFixed(1)}`);
            await sendCommand(`SET_CURR_ALARM:${currVal.toFixed(2)}`);
            await sendCommand(`SET_VOLT_ALARM:${voltVal.toFixed(2)}`);
            messageFooter.textContent = '阈值已发送';
        });

        stopAlarmBtn.addEventListener('click', async () => {
            if (!isConnected) {
                messageFooter.textContent = '请先连接蓝牙';
                return;
            }
            await sendCommand('CLEAR_ALARM');
        });

        navigator.serial?.addEventListener('disconnect', (e) => {
            if (port === e.target) {
                setConnected(false);
                port = null;
                messageFooter.textContent = '蓝牙设备已断开';
            }
        });

        setConnected(false);
    })();
</script>
</body>
</html>
