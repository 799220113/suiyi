<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STM32 蓝牙监控</title>
    
    <!-- PWA Manifest (内嵌) -->
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22: %22STM32 蓝牙监控系统%22,
        %22short_name%22: %22蓝牙监控%22,
        %22description%22: %22连接JDY-33，实时显示温度、电压、电流，并可设置报警阈值%22,
        %22start_url%22: %22.%22,
        %22display%22: %22standalone%22,
        %22orientation%22: %22portrait%22,
        %22background_color%22: %22%23f5f7fb%22,
        %22theme_color%22: %22%233b82f6%22,
        %22icons%22: [
            {
                %22src%22: %22https://placehold.co/192x192/3b82f6/white?text=BT%22,
                %22sizes%22: %22192x192%22,
                %22type%22: %22image/png%22
            },
            {
                %22src%22: %22https://placehold.co/512x512/3b82f6/white?text=BT+Monitor%22,
                %22sizes%22: %22512x512%22,
                %22type%22: %22image/png%22,
                %22purpose%22: %22any maskable%22
            }
        ]
    }">
    
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="蓝牙监控">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/3b82f6/white?text=BT">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 24px 20px;
        }
        h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 6px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .subtitle { color: #64748b; margin-bottom: 20px; font-weight: 400; border-left: 4px solid #3b82f6; padding-left: 12px; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 12px 16px; border-radius: 40px; margin-bottom: 24px; }
        .status-indicator { display: flex; align-items: center; gap: 8px; }
        .led { width: 12px; height: 12px; border-radius: 50%; background: #cbd5e1; transition: background 0.2s; }
        .led.connected { background: #10b981; box-shadow: 0 0 8px #10b98180; }
        .btn-group { display: flex; gap: 8px; }
        .btn {
            border: none; background: #e2e8f0; padding: 8px 16px; border-radius: 30px;
            font-weight: 500; color: #1e293b; cursor: pointer; transition: all 0.15s;
            font-size: 0.9rem; border: 1px solid transparent;
        }
        .btn-primary { background: #3b82f6; color: white; box-shadow: 0 4px 8px #3b82f640; }
        .btn-primary:active { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; }
        .btn-outline:active { background: #f1f5f9; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .data-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
        .data-item { background: #f8fafc; border-radius: 24px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; }
        .data-label { font-size: 1.2rem; font-weight: 500; color: #334155; }
        .data-value { font-size: 2.4rem; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
        .data-unit { font-size: 1rem; font-weight: 400; color: #64748b; margin-left: 4px; }
        .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; color: #1e293b; }
        .threshold-item { display: flex; align-items: center; margin-bottom: 14px; gap: 10px; }
        .threshold-item label { width: 70px; font-weight: 500; color: #475569; }
        .threshold-item input { flex: 1; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 1rem; background: white; outline: none; }
        .threshold-item input:focus { border-color: #3b82f6; }
        .action-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .action-buttons .btn { flex: 1; padding: 14px 0; text-align: center; font-size: 1.1rem; }
        .footer-note { margin-top: 20px; text-align: center; color: #94a3b8; font-size: 0.8rem; }
        .warning { background: #fef9c3; color: #854d0e; padding: 12px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h1>📟 监测系统</h1>
    <div class="subtitle">JDY-33 · 蓝牙串口</div>
    <div class="status-bar">
        <div class="status-indicator">
            <span class="led" id="led"></span>
            <span id="statusText">未连接</span>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="connectBtn">🔗 连接</button>
            <button class="btn btn-outline" id="disconnectBtn" disabled>断开</button>
        </div>
    </div>
    <div id="compatWarning" class="warning" style="display: none;">⚠️ 当前浏览器不支持 Web Serial，请使用 Chrome/Edge 桌面版或 Android 版。</div>
    <div class="data-grid">
        <div class="data-item"><span class="data-label">🌡️ 温度</span><span class="data-value" id="tempDisplay">--<span class="data-unit">°C</span></span></div>
        <div class="data-item"><span class="data-label">⚡ 电压</span><span class="data-value" id="voltDisplay">--<span class="data-unit">V</span></span></div>
        <div class="data-item"><span class="data-label">🔌 电流</span><span class="data-value" id="currDisplay">--<span class="data-unit">A</span></span></div>
    </div>
    <div class="section-title">⚙️ 报警阈值</div>
    <div class="threshold-item"><label>温度</label><input type="number" id="tempThreshold" value="30.0" step="0.5" min="0" max="100"> <span style="margin-left:6px;">°C</span></div>
    <div class="threshold-item"><label>电流</label><input type="number" id="currThreshold" value="2.00" step="0.10" min="0" max="10"> <span style="margin-left:6px;">A</span></div>
    <div class="threshold-item"><label>电压</label><input type="number" id="voltThreshold" value="5.50" step="0.10" min="0" max="30"> <span style="margin-left:6px;">V</span></div>
    <div class="action-buttons">
        <button class="btn btn-primary" id="updateThresholdBtn">📤 更新阈值</button>
        <button class="btn btn-outline" id="stopAlarmBtn">🔕 停止报警</button>
    </div>
    <div class="footer-note" id="messageFooter">就绪</div>
</div>
<script>
    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',()=>self.clients.claim());self.addEventListener('fetch',(e)=>e.respondWith(fetch(e.request)));`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
    (function(){"use strict";
        const led=document.getElementById('led'),statusText=document.getElementById('statusText'),connectBtn=document.getElementById('connectBtn'),disconnectBtn=document.getElementById('disconnectBtn');
        const tempDisplay=document.getElementById('tempDisplay'),voltDisplay=document.getElementById('voltDisplay'),currDisplay=document.getElementById('currDisplay');
        const tempThreshold=document.getElementById('tempThreshold'),currThreshold=document.getElementById('currThreshold'),voltThreshold=document.getElementById('voltThreshold');
        const updateThresholdBtn=document.getElementById('updateThresholdBtn'),stopAlarmBtn=document.getElementById('stopAlarmBtn'),messageFooter=document.getElementById('messageFooter'),compatWarning=document.getElementById('compatWarning');
        let port=null,reader=null,isConnected=false,buffer='';
        const isWebSerialSupported='serial'in navigator;
        if(!isWebSerialSupported){compatWarning.style.display='block';connectBtn.disabled=true;messageFooter.textContent='浏览器不支持 Web Serial';}
        function setConnected(s){isConnected=s;if(s){led.classList.add('connected');statusText.textContent='已连接';connectBtn.disabled=true;disconnectBtn.disabled=false;messageFooter.textContent='蓝牙已连接';}else{led.classList.remove('connected');statusText.textContent='未连接';connectBtn.disabled=!isWebSerialSupported;disconnectBtn.disabled=true;messageFooter.textContent='已断开';tempDisplay.innerHTML='--<span class="data-unit">°C</span>';voltDisplay.innerHTML='--<span class="data-unit">V</span>';currDisplay.innerHTML='--<span class="data-unit">A</span>';}}
        async function sendCommand(cmd){if(!port||!port.writable){messageFooter.textContent='错误: 串口未连接';return false;}try{const w=port.writable.getWriter();await w.write(new TextEncoder().encode(cmd+'\r\n'));w.releaseLock();messageFooter.textContent=`已发送: ${cmd}`;return true;}catch(e){messageFooter.textContent='发送失败';return false;}}
        function parseLine(l){l=l.trim();if(!l)return;let m=l.match(/TEMP:([-+]?\d*\.?\d+)/i);if(m)tempDisplay.innerHTML=`${parseFloat(m[1]).toFixed(1)}<span class="data-unit">°C</span>`;m=l.match(/VOLT:([-+]?\d*\.?\d+)/i);if(m)voltDisplay.innerHTML=`${parseFloat(m[1]).toFixed(2)}<span class="data-unit">V</span>`;m=l.match(/CURR:([-+]?\d*\.?\d+)/i);if(m)currDisplay.innerHTML=`${parseFloat(m[1]).toFixed(2)}<span class="data-unit">A</span>`;}
        function processIncoming(t){buffer+=t;const lines=buffer.split('\n');buffer=lines.pop()||'';lines.forEach(l=>parseLine(l.replace(/\r$/,'')));}
        async function readLoop(){if(!port||!port.readable)return;try{reader=port.readable.getReader();while(true){const{value,done}=await reader.read();if(done){reader.releaseLock();break;}processIncoming(new TextDecoder().decode(value));}}catch(e){}finally{if(reader){reader.releaseLock();reader=null;}if(isConnected){setConnected(false);port=null;}}}
        connectBtn.addEventListener('click',async()=>{if(!isWebSerialSupported)return;try{const p=await navigator.serial.requestPort();await p.open({baudRate:9600});port=p;setConnected(true);readLoop();}catch(e){messageFooter.textContent=e.message.includes('No port')?'未选择设备':'连接失败: '+e.message;}});
        disconnectBtn.addEventListener('click',async()=>{try{if(reader){await reader.cancel();reader.releaseLock();reader=null;}if(port){await port.close();port=null;}setConnected(false);}catch(e){}});
        updateThresholdBtn.addEventListener('click',async()=>{if(!isConnected){messageFooter.textContent='请先连接蓝牙';return;}const tv=parseFloat(tempThreshold.value),cv=parseFloat(currThreshold.value),vv=parseFloat(voltThreshold.value);if(isNaN(tv)||isNaN(cv)||isNaN(vv)){messageFooter.textContent='阈值必须为数字';return;}await sendCommand(`SET_TEMP_ALARM:${tv.toFixed(1)}`);await sendCommand(`SET_CURR_ALARM:${cv.toFixed(2)}`);await sendCommand(`SET_VOLT_ALARM:${vv.toFixed(2)}`);messageFooter.textContent='阈值已发送';});
        stopAlarmBtn.addEventListener('click',async()=>{if(!isConnected){messageFooter.textContent='请先连接蓝牙';return;}await sendCommand('CLEAR_ALARM');});
        navigator.serial?.addEventListener('disconnect',e=>{if(port===e.target){setConnected(false);port=null;}});
        setConnected(false);
    })();
</script>
</body>
</html>
