<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STM32 蓝牙监控 (修复版)</title>
    
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22STM32%20%E8%93%9D%E7%89%99%E7%9B%91%E6%8E%A7%22,
        %22short_name%22:%22%E8%93%9D%E7%89%99%E7%9B%91%E6%8E%A7%22,
        %22start_url%22:%22.%22,
        %22display%22:%22standalone%22,
        %22orientation%22:%22portrait%22,
        %22background_color%22:%22%23f5f7fb%22,
        %22theme_color%22:%22%233b82f6%22,
        %22icons%22:[
            {%22src%22:%22https://placehold.co/192x192/3b82f6/white?text=BT%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},
            {%22src%22:%22https://placehold.co/512x512/3b82f6/white?text=BT+Monitor%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22,%22purpose%22:%22any%20maskable%22}
        ]
    }">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="蓝牙监控">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/3b82f6/white?text=BT">
    
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:#f5f7fb;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:12px}
        .card{max-width:480px;width:100%;background:white;border-radius:32px;box-shadow:0 10px 30px rgba(0,0,0,.05);padding:24px 20px}
        h1{font-size:1.8rem;font-weight:600;margin-bottom:6px;color:#1e293b;display:flex;align-items:center;gap:8px}
        .subtitle{color:#64748b;margin-bottom:20px;font-weight:400;border-left:4px solid #3b82f6;padding-left:12px}
        .status-bar{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:12px 16px;border-radius:40px;margin-bottom:24px}
        .led{width:12px;height:12px;border-radius:50%;background:#cbd5e1;transition:background .2s}
        .led.connected{background:#10b981;box-shadow:0 0 8px #10b98180}
        .btn{border:none;background:#e2e8f0;padding:8px 16px;border-radius:30px;font-weight:500;color:#1e293b;cursor:pointer;font-size:.9rem;border:1px solid transparent}
        .btn-primary{background:#3b82f6;color:white;box-shadow:0 4px 8px #3b82f640}
        .btn-outline{background:transparent;border:1px solid #cbd5e1}
        .btn:disabled{opacity:.5;pointer-events:none}
        .data-grid{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}
        .data-item{background:#f8fafc;border-radius:24px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between}
        .data-label{font-size:1.2rem;font-weight:500;color:#334155}
        .data-value{font-size:2.4rem;font-weight:700;color:#0f172a}
        .data-unit{font-size:1rem;font-weight:400;color:#64748b;margin-left:4px}
        .section-title{font-size:1.2rem;font-weight:600;margin-bottom:16px;color:#1e293b}
        .threshold-item{display:flex;align-items:center;margin-bottom:14px;gap:10px}
        .threshold-item label{width:70px;font-weight:500;color:#475569}
        input{flex:1;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:20px;font-size:1rem;background:white;outline:none}
        input:focus{border-color:#3b82f6}
        .action-buttons{display:flex;gap:12px;margin-top:20px}
        .action-buttons .btn{flex:1;padding:14px 0;text-align:center;font-size:1.1rem}
        .footer-note{margin-top:20px;text-align:center;color:#94a3b8;font-size:.8rem}
        .warning{background:#fef9c3;color:#854d0e;padding:12px;border-radius:20px;font-size:.9rem;margin-bottom:16px}
        .debug-panel{background:#1e293b;color:#0f0;font-family:monospace;padding:12px;border-radius:16px;margin-top:16px;font-size:0.75rem;max-height:150px;overflow-y:auto;word-break:break-all}
        .debug-panel div{margin-bottom:4px}
    </style>
</head>
<body>
<div class="card">
    <h1>📟 监测系统</h1>
    <div class="subtitle">JDY-33 · BLE调试版</div>
    <div class="status-bar">
        <div><span class="led" id="led"></span> <span id="statusText">未连接</span></div>
        <div>
            <button class="btn btn-primary" id="connectBtn">🔗 连接</button>
            <button class="btn btn-outline" id="disconnectBtn" disabled>断开</button>
        </div>
    </div>
    
    <div class="data-grid">
        <div class="data-item"><span class="data-label">🌡️ 温度</span><span class="data-value" id="tempDisplay">--<span class="data-unit">°C</span></span></div>
        <div class="data-item"><span class="data-label">⚡ 电压</span><span class="data-value" id="voltDisplay">--<span class="data-unit">V</span></span></div>
        <div class="data-item"><span class="data-label">🔌 电流</span><span class="data-value" id="currDisplay">--<span class="data-unit">A</span></span></div>
    </div>

    <div class="section-title">⚙️ 报警阈值</div>
    <div class="threshold-item"><label>温度</label><input type="number" id="tempThreshold" value="30.0" step="0.5"> <span>°C</span></div>
    <div class="threshold-item"><label>电流</label><input type="number" id="currThreshold" value="2.00" step="0.10"> <span>A</span></div>
    <div class="threshold-item"><label>电压</label><input type="number" id="voltThreshold" value="5.50" step="0.10"> <span>V</span></div>
    <div class="action-buttons">
        <button class="btn btn-primary" id="updateThresholdBtn">📤 更新阈值</button>
        <button class="btn btn-outline" id="stopAlarmBtn">🔕 停止报警</button>
    </div>
    
    <div class="section-title" style="margin-top:20px;">🛠️ 手动指令与调试</div>
    <div class="threshold-item">
        <input type="text" id="manualCmd" placeholder="输入指令,例如 CLEAR_ALARM">
        <button class="btn btn-primary" id="sendManualBtn">发送</button>
    </div>
    <div class="debug-panel" id="debugBox"></div>
    <div class="footer-note" id="messageFooter">就绪</div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(
            "self.addEventListener('install',function(){self.skipWaiting()});" +
            "self.addEventListener('activate',function(){self.clients.claim()});" +
            "self.addEventListener('fetch',function(e){e.respondWith(fetch(e.request))});"
        ));
    }

    (function(){
        if(!navigator.bluetooth){
            document.getElementById('messageFooter').textContent='浏览器不支持蓝牙';
            return;
        }

        const serviceUUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
        const charUUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
        let device, server, txChar, rxChar, connected = false;
        const debugBox = document.getElementById('debugBox');
        const messageFooter = document.getElementById('messageFooter');

        function log(msg, isError = false) {
            const entry = document.createElement('div');
            entry.style.color = isError ? '#ff8888' : '#0f0';
            entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            debugBox.appendChild(entry);
            debugBox.scrollTop = debugBox.scrollHeight;
        }

        function setConnected(state){
            connected = state;
            document.getElementById('led').className = 'led' + (state ? ' connected' : '');
            document.getElementById('statusText').textContent = state ? '已连接' : '未连接';
            document.getElementById('connectBtn').disabled = state;
            document.getElementById('disconnectBtn').disabled = !state;
            if (state) log('✅ 蓝牙已连接');
            else log('⛔ 蓝牙已断开');
        }

        // 发送函数：先尝试带响应写入，失败则尝试无响应写入
        async function send(cmd){
            if(!txChar) {
                log('❌ 未获取到发送特征值', true);
                return;
            }
            const fullCmd = cmd + '\r\n';
            log('📤 准备发送: ' + cmd);
            try {
                // 先尝试带响应的写入
                await txChar.writeValue(new TextEncoder().encode(fullCmd));
                log('✅ 带响应写入成功');
            } catch (e1) {
                log('⚠️ 带响应写入失败: ' + e1.message, true);
                try {
                    // 尝试无响应写入
                    await txChar.writeValueWithoutResponse(new TextEncoder().encode(fullCmd));
                    log('✅ 无响应写入成功');
                } catch (e2) {
                    log('❌ 无响应写入也失败: ' + e2.message, true);
                    messageFooter.textContent = '发送失败，请查看日志';
                }
            }
        }

        document.getElementById('connectBtn').onclick = async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'JDY' }],
                    optionalServices: [serviceUUID]
                });
                device.addEventListener('gattserverdisconnected', () => setConnected(false));
                server = await device.gatt.connect();
                const service = await server.getPrimaryService(serviceUUID);
                txChar = await service.getCharacteristic(charUUID);
                rxChar = await service.getCharacteristic(charUUID);
                await rxChar.startNotifications();
                rxChar.addEventListener('characteristicvaluechanged', e => {
                    let text = new TextDecoder().decode(e.target.value);
                    log('📩 收到: ' + text);
                    let t = text.match(/TEMP:([\d.]+)/), 
                        v = text.match(/VOLT:([\d.]+)/), 
                        c = text.match(/CURR:([\d.]+)/);
                    if(t) document.getElementById('tempDisplay').innerHTML = parseFloat(t[1]).toFixed(1)+'<span class="data-unit">°C</span>';
                    if(v) document.getElementById('voltDisplay').innerHTML = parseFloat(v[1]).toFixed(2)+'<span class="data-unit">V</span>';
                    if(c) document.getElementById('currDisplay').innerHTML = parseFloat(c[1]).toFixed(2)+'<span class="data-unit">A</span>';
                });
                setConnected(true);
            } catch(err) { 
                log('❌ 连接失败: ' + err.message, true);
                alert('连接失败：' + err.message); 
            }
        };

        document.getElementById('disconnectBtn').onclick = () => {
            if (device && device.gatt.connected) device.gatt.disconnect();
        };

document.getElementById('updateThresholdBtn').onclick = () => {
    send('T:' + document.getElementById('tempThreshold').value);
    send('C:' + document.getElementById('currThreshold').value);
    send('V:' + document.getElementById('voltThreshold').value);
    messageFooter.textContent = '指令已发送';
};

document.getElementById('stopAlarmBtn').onclick = () => send('X');

        document.getElementById('sendManualBtn').onclick = () => {
            let cmd = document.getElementById('manualCmd').value;
            if (cmd) send(cmd);
            else messageFooter.textContent = '请输入指令';
        };

        log('🔍 调试模式已启动，请连接蓝牙');
    })();
</script>
</body>
</html>
